<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleknyyy Store | متجر أنيق وعصري</title>
    
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            overflow-x: hidden;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --gradient-primary: linear-gradient(135deg, #2563eb, #7c3aed);
            --gradient-success: linear-gradient(135deg, #10b981, #059669);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.15);
            --border-radius-sm: 8px;
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;
            --transition: all 0.3s ease;
        }

        /* شريط التنقل */
        .navbar {
            background: white;
            box-shadow: var(--shadow-md);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 2.2rem;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-link {
            color: var(--dark);
            font-weight: 500;
            padding: 0.5rem 1.2rem !important;
            border-radius: 30px;
            transition: var(--transition);
        }

        .nav-link:hover {
            background: var(--gradient-primary);
            color: white !important;
        }

        .nav-link.active {
            background: var(--gradient-primary);
            color: white !important;
        }

        /* شريط العروض */
        .announcement-bar {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: white;
            padding: 0.8rem 0;
            text-align: center;
            font-weight: 600;
        }

        /* قسم البطل */
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4rem 0;
            border-radius: 0 0 3rem 3rem;
            margin-bottom: 2rem;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
        }

        /* أيقونات الثقة */
        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 2rem 0;
            background: white;
            border-radius: var(--border-radius-xl);
            margin: 2rem 0;
            box-shadow: var(--shadow-lg);
        }

        .trust-item {
            text-align: center;
        }

        .trust-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
            font-size: 1.5rem;
        }

        /* الأقسام */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .category-card {
            background: white;
            border-radius: var(--border-radius-lg);
            padding: 1.5rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }

        .category-icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .category-name {
            font-weight: 600;
        }

        /* المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .product-card {
            background: white;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-xl);
        }

        .product-image {
            height: 220px;
            overflow: hidden;
            position: relative;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 2;
        }

        .product-info {
            padding: 1.2rem;
        }

        .product-category {
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .product-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .product-price::after {
            content: ' د.ج';
            font-size: 0.9rem;
        }

        .btn-order {
            background: var(--gradient-success);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.6rem;
            font-weight: 600;
            width: 100%;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-order:hover {
            transform: scale(1.02);
        }

        /* صفحة المنتج */
        .product-page {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-details {
            background: white;
            border-radius: var(--border-radius-xl);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
        }

        .main-image {
            width: 100%;
            height: 400px;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
        }

        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .product-price-large {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .product-price-large::after {
            content: ' د.ج';
            font-size: 1.2rem;
        }

        .product-description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--gray);
            margin-bottom: 2rem;
        }

        .btn-order-large {
            background: var(--gradient-success);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            width: 100%;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-outline-primary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 50px;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            width: 100%;
            margin-top: 1rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-outline-primary:hover {
            background: var(--primary);
            color: white;
        }

        /* التقييمات */
        .reviews-section {
            margin-top: 2rem;
            padding: 2rem;
            background: #f8fafc;
            border-radius: var(--border-radius-lg);
        }

        .review-item {
            background: white;
            padding: 1rem;
            border-radius: var(--border-radius-md);
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .review-rating {
            color: #f59e0b;
        }

        .review-form {
            background: white;
            padding: 1.5rem;
            border-radius: var(--border-radius-md);
            margin-top: 1.5rem;
            box-shadow: var(--shadow-md);
        }

        .star-rating {
            font-size: 1.5rem;
            cursor: pointer;
            direction: ltr;
            text-align: center;
        }

        .star-rating i {
            color: #ddd;
            transition: var(--transition);
        }

        .star-rating i.active,
        .star-rating i:hover {
            color: #f59e0b;
        }

        /* نافذة الطلب */
        .order-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .order-modal.active {
            display: flex;
        }

        .order-content {
            background: white;
            border-radius: var(--border-radius-xl);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-close {
            width: 35px;
            height: 35px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .product-preview {
            display: flex;
            gap: 1rem;
            background: #f8fafc;
            padding: 1rem;
            border-radius: var(--border-radius-md);
            margin-bottom: 1.5rem;
        }

        .preview-img {
            width: 80px;
            height: 80px;
            border-radius: var(--border-radius-sm);
            overflow: hidden;
        }

        .preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-md);
            margin-bottom: 1rem;
            font-family: 'Tajawal', sans-serif;
            transition: var(--transition);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            outline: none;
        }

        .btn-submit {
            background: var(--gradient-success);
            color: white;
            border: none;
            border-radius: var(--border-radius-xl);
            padding: 1rem;
            font-weight: 700;
            width: 100%;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-lg);
        }

        /* نافذة الخروج */
        .exit-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 10001;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .exit-popup.show {
            display: flex;
        }

        .popup-content {
            background: white;
            border-radius: var(--border-radius-xl);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .popup-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: var(--danger);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .popup-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .popup-discount {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: white;
            padding: 1rem;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: 800;
            margin: 1rem 0;
        }

        /* أزرار ثابتة */
        .fixed-buttons {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 999;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.2rem;
            box-shadow: var(--shadow-xl);
            cursor: pointer;
            transition: var(--transition);
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        /* الوضع الليلي */
        [data-theme="dark"] {
            background: #0f172a;
            color: white;
        }

        [data-theme="dark"] .navbar,
        [data-theme="dark"] .product-card,
        [data-theme="dark"] .category-card,
        [data-theme="dark"] .order-content,
        [data-theme="dark"] .trust-badges,
        [data-theme="dark"] .popup-content,
        [data-theme="dark"] .footer {
            background: #1e293b;
            color: white;
            border-color: #334155;
        }

        [data-theme="dark"] .form-control,
        [data-theme="dark"] .form-select {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        /* تذييل */
        .footer {
            background: white;
            padding: 2rem 0;
            margin-top: 4rem;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        /* التجاوب مع الجوال */
        @media (max-width: 992px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .categories-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .categories-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .trust-badges {
                flex-wrap: wrap;
                gap: 1rem;
            }
            .hero-title {
                font-size: 2rem;
            }
        }

        @media (max-width: 576px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* إخفاء أي رسائل نظام */
        .windows-notification,
        [class*="windows"],
        [id*="windows"] {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- شريط العروض -->
    <div class="announcement-bar">
        <i class="fas fa-gift"></i>
        🎉 خصم 20% على أول طلب + توصيل مجاني للطلبات فوق 5000 دج
        <i class="fas fa-gift"></i>
    </div>

    <!-- شريط التنقل -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html" id="storeName">Seleknyyy Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showAllProducts()">المنتجات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="scrollToCategories()">الأقسام</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- أيقونات الثقة -->
    <div class="container">
        <div class="trust-badges">
            <div class="trust-item">
                <div class="trust-icon"><i class="fas fa-truck"></i></div>
                <div>توصيل سريع</div>
            </div>
            <div class="trust-item">
                <div class="trust-icon"><i class="fas fa-shield-alt"></i></div>
                <div>دفع آمن</div>
            </div>
            <div class="trust-item">
                <div class="trust-icon"><i class="fas fa-undo-alt"></i></div>
                <div>إرجاع مجاني</div>
            </div>
            <div class="trust-item">
                <div class="trust-icon"><i class="fas fa-headset"></i></div>
                <div>دعم 24/7</div>
            </div>
        </div>
    </div>

    <!-- أزرار ثابتة -->
    <div class="fixed-buttons">
        <button class="action-btn" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="action-btn" onclick="scrollToTop()">
            <i class="fas fa-arrow-up"></i>
        </button>
    </div>

    <!-- نافذة الخروج -->
    <div class="exit-popup" id="exitPopup">
        <div class="popup-content">
            <button class="popup-close" onclick="closeExitPopup()">
                <i class="fas fa-times"></i>
            </button>
            <div class="popup-icon">🎁</div>
            <h3>لا تذهب!</h3>
            <p>احصل على خصم 10% على طلبك الأول</p>
            <div class="popup-discount">10% خصم</div>
            <input type="email" class="form-control mb-2" id="popupEmail" placeholder="بريدك الإلكتروني">
            <button class="btn btn-primary w-100" onclick="getDiscount()">احصل على الخصم</button>
        </div>
    </div>

    <!-- نافذة الطلب -->
    <div class="order-modal" id="orderModal">
        <div class="order-content">
            <div class="modal-header">
                <h5>📝 طلب جديد</h5>
                <button class="modal-close" onclick="closeOrderModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="product-preview" id="orderPreview"></div>

            <form id="orderForm" onsubmit="event.preventDefault(); submitOrder();">
                <input type="hidden" id="orderProductId">
                <input type="hidden" id="orderProductName">
                <input type="hidden" id="orderProductPrice">
                
                <input type="text" class="form-control" id="orderName" placeholder="الاسم الكامل" required>
                <input type="tel" class="form-control" id="orderPhone" placeholder="رقم الهاتف" required>
                <select class="form-select" id="orderWilaya" required>
                    <option value="">اختر الولاية</option>
                </select>
                <textarea class="form-control" id="orderAddress" rows="2" placeholder="العنوان بالتفصيل" required></textarea>
                
                <button type="submit" class="btn-submit">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <main id="mainContent">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">جاري التحميل...</span>
            </div>
        </div>
    </main>

    <!-- تذييل -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">جميع الحقوق محفوظة &copy; 2025 Seleknyyy Store</p>
        </div>
    </footer>

    <script>
        // المنتجات
        const products = [
            { id: '1', name: 'تيشيرت قطني', price: '2500', category: 'ملابس', image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400', description: 'تيشيرت قطني 100%، مريح ومناسب للصيف', rating: 4.5, reviews: [] },
            { id: '2', name: 'حذاء رياضي نايك', price: '8500', category: 'أحذية', image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400', description: 'حذاء رياضي أصلي مريح للجري', rating: 4.8, reviews: [] },
            { id: '3', name: 'ساعة ذكية', price: '15000', category: 'إلكترونيات', image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400', description: 'ساعة ذكية تقيس ضربات القلب', rating: 4.7, reviews: [] },
            { id: '4', name: 'حقيبة جلدية', price: '12000', category: 'حقائب', image: 'https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400', description: 'حقيبة جلد طبيعي فاخرة', rating: 4.6, reviews: [] },
            { id: '5', name: 'نظارة شمسية', price: '4500', category: 'إكسسوارات', image: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400', description: 'نظارة شمسية أنيقة', rating: 4.9, reviews: [] },
            { id: '6', name: 'سماعة لاسلكية', price: '6500', category: 'إلكترونيات', image: 'https://images.unsplash.com/photo-1583394838336-acd977736f90?w=400', description: 'سماعة بلوتوث نقية', rating: 4.8, reviews: [] },
            { id: '7', name: 'كريم ترطيب', price: '1800', category: 'تجميل', image: 'https://images.unsplash.com/photo-1556229010-6c3f2c9ca5f8?w=400', description: 'كريم ترطيب للبشرة', rating: 4.4, reviews: [] },
            { id: '8', name: 'محفظة رجالية', price: '3200', category: 'إكسسوارات', image: 'https://images.unsplash.com/photo-1627123424574-724758594e93?w=400', description: 'محفظة جلد أنيقة', rating: 4.5, reviews: [] }
        ];

        // الولايات الجزائرية
        const wilayas = [
            "أدرار", "الشلف", "الأغواط", "أم البواقي", "باتنة", "بجاية", "بسكرة", 
            "بشار", "البليدة", "البويرة", "تمنراست", "تبسة", "تلمسان", "تيارت", 
            "تيزي وزو", "الجزائر", "الجلفة", "جيجل", "سطيف", "سعيدة", "سكيكدة", 
            "سيدي بلعباس", "عنابة", "قالمة", "قسنطينة", "المدية", "مستغانم", 
            "المسيلة", "معسكر", "ورقلة", "وهران", "البيض", "إليزي", "برج بوعريريج", 
            "بومرداس", "الطارف", "تندوف", "تيسمسيلت", "الوادي", "خنشلة", "سوق أهراس", 
            "تيبازة", "ميلة", "عين الدفلى", "النعامة", "عين تموشنت", "غرداية", "غليزان"
        ];

        let currentRating = 5;

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', function() {
            loadHomePage();
            initWilayas();
            initExitPopup();
        });

        function loadHomePage() {
            const main = document.getElementById('mainContent');
            const categories = [...new Set(products.map(p => p.category))];
            
            const icons = {
                'ملابس': 'fa-tshirt', 'أحذية': 'fa-shoe-prints', 'إلكترونيات': 'fa-mobile-alt',
                'حقائب': 'fa-bag-shopping', 'إكسسوارات': 'fa-clock', 'تجميل': 'fa-spa'
            };

            main.innerHTML = `
                <section class="hero-section">
                    <div class="container text-center">
                        <h1 class="hero-title">Seleknyyy Store</h1>
                        <p class="hero-subtitle mb-4">تسوق بأمان وثقة - أفضل المنتجات الأصلية</p>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number">${products.length}</div>
                                <div>منتج</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">5000+</div>
                                <div>عميل</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">4.9</div>
                                <div>تقييم</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="container my-5" id="categories">
                    <h2 class="text-center mb-4">تصفح الأقسام</h2>
                    <div class="categories-grid">
                        ${categories.map(cat => `
                            <div class="category-card" onclick="filterByCategory('${cat}')">
                                <i class="fas ${icons[cat] || 'fa-tag'} category-icon"></i>
                                <div class="category-name">${cat}</div>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <section class="container my-5">
                    <h2 class="text-center mb-4">🔥 أحدث المنتجات</h2>
                    <div class="products-grid">
                        ${products.map(product => createProductCard(product)).join('')}
                    </div>
                </section>
            `;
        }

        function createProductCard(product) {
            return `
                <div class="product-card" onclick="showProductPage('${product.id}')">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" loading="lazy">
                        <div class="product-badge">جديد</div>
                    </div>
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                        <button class="btn-order" onclick="event.stopPropagation(); openOrderModal('${product.id}')">
                            اطلب الآن
                        </button>
                    </div>
                </div>
            `;
        }

        function showProductPage(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="product-page">
                    <div class="product-details">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="main-image">
                                    <img src="${product.image}" alt="${product.name}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <h1 class="product-title">${product.name}</h1>
                                <div class="product-price-large">${product.price}</div>
                                <p class="product-description">${product.description}</p>
                                <button class="btn-order-large mb-2" onclick="openOrderModal('${product.id}')">
                                    اطلب الآن
                                </button>
                                <button class="btn-outline-primary" onclick="loadHomePage()">
                                    عودة للرئيسية
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="reviews-section">
                        <h5 class="mb-3">⭐ التقييمات</h5>
                        <div id="reviewsList">
                            ${product.reviews.length > 0 ? 
                                product.reviews.map(r => `
                                    <div class="review-item">
                                        <div class="review-header">
                                            <span class="fw-bold">${r.name}</span>
                                            <span class="review-rating">${'⭐'.repeat(r.rating)}</span>
                                        </div>
                                        <p>${r.comment}</p>
                                        <small class="text-muted">${new Date(r.date).toLocaleDateString('ar-DZ')}</small>
                                    </div>
                                `).join('') : 
                                '<p class="text-muted">لا توجد تقييمات بعد</p>'}
                        </div>
                        
                        <div class="review-form">
                            <h6 class="mb-3">أضف تقييمك</h6>
                            <div class="star-rating mb-2" id="starRating">
                                <i class="fas fa-star" onclick="setRating(1)"></i>
                                <i class="fas fa-star" onclick="setRating(2)"></i>
                                <i class="fas fa-star" onclick="setRating(3)"></i>
                                <i class="fas fa-star" onclick="setRating(4)"></i>
                                <i class="fas fa-star" onclick="setRating(5)"></i>
                            </div>
                            <input type="hidden" id="reviewRating" value="5">
                            <textarea class="form-control mb-2" id="reviewComment" rows="2" placeholder="اكتب رأيك..."></textarea>
                            <input type="text" class="form-control mb-2" id="reviewName" placeholder="اسمك">
                            <button class="btn btn-primary w-100" onclick="addReview('${product.id}')">إرسال التقييم</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function setRating(rating) {
            currentRating = rating;
            document.getElementById('reviewRating').value = rating;
            const stars = document.querySelectorAll('.star-rating i');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.style.color = '#f59e0b';
                } else {
                    star.style.color = '#ddd';
                }
            });
        }

        function addReview(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const comment = document.getElementById('reviewComment').value;
            const name = document.getElementById('reviewName').value;

            if (!comment || !name) {
                Swal.fire('خطأ', 'الرجاء ملء جميع الحقول', 'error');
                return;
            }

            product.reviews.push({
                name,
                rating: currentRating,
                comment,
                date: new Date().toISOString()
            });

            Swal.fire('تم', 'تم إضافة تقييمك بنجاح', 'success');
            showProductPage(productId);
        }

        function filterByCategory(category) {
            const filtered = products.filter(p => p.category === category);
            const main = document.getElementById('mainContent');
            
            main.innerHTML = `
                <div class="container my-5">
                    <h2 class="mb-4">${category}</h2>
                    <div class="products-grid">
                        ${filtered.map(p => createProductCard(p)).join('')}
                    </div>
                    <button class="btn btn-primary mt-3" onclick="loadHomePage()">عودة للرئيسية</button>
                </div>
            `;
        }

        function showAllProducts() {
            loadHomePage();
        }

        function scrollToCategories() {
            document.getElementById('categories')?.scrollIntoView({ behavior: 'smooth' });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initWilayas() {
            const select = document.getElementById('orderWilaya');
            if (select) {
                select.innerHTML = '<option value="">اختر الولاية</option>' + 
                    wilayas.map(w => `<option value="${w}">${w}</option>`).join('');
            }
        }

        function openOrderModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            document.getElementById('orderProductId').value = productId;
            document.getElementById('orderProductName').value = product.name;
            document.getElementById('orderProductPrice').value = product.price;

            document.getElementById('orderPreview').innerHTML = `
                <div class="preview-img">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <div>
                    <h6>${product.name}</h6>
                    <p class="text-primary">${product.price} د.ج</p>
                </div>
            `;

            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
            document.getElementById('orderForm').reset();
        }

        function submitOrder() {
            const order = {
                productId: document.getElementById('orderProductId').value,
                productName: document.getElementById('orderProductName').value,
                productPrice: document.getElementById('orderProductPrice').value,
                customerName: document.getElementById('orderName').value,
                customerPhone: document.getElementById('orderPhone').value,
                customerWilaya: document.getElementById('orderWilaya').value,
                customerAddress: document.getElementById('orderAddress').value,
                date: new Date().toLocaleString(),
                orderNumber: 'ORD-' + Date.now().toString().slice(-6)
            };

            if (!order.customerName || !order.customerPhone || !order.customerWilaya || !order.customerAddress) {
                Swal.fire('خطأ', 'الرجاء ملء جميع الحقول', 'error');
                return;
            }

            // حفظ في localStorage
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));

            Swal.fire({
                icon: 'success',
                title: 'تم الطلب بنجاح',
                html: `رقم الطلب: <strong>${order.orderNumber}</strong>`,
                confirmButtonText: 'حسناً'
            });
            
            closeOrderModal();
        }

        function initExitPopup() {
            setTimeout(() => {
                if (!localStorage.getItem('popupShown')) {
                    document.getElementById('exitPopup')?.classList.add('show');
                }
            }, 5000);
        }

        function closeExitPopup() {
            document.getElementById('exitPopup')?.classList.remove('show');
            localStorage.setItem('popupShown', 'true');
        }

        function getDiscount() {
            const email = document.getElementById('popupEmail')?.value;
            if (email) {
                Swal.fire('🎉 كوبون الخصم', 'كوبون خصم 10%: WELCOME10', 'success');
                closeExitPopup();
            } else {
                Swal.fire('خطأ', 'الرجاء إدخال البريد الإلكتروني', 'error');
            }
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        }

        // تحميل الوضع المحفوظ
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeIcon').className = 'fas fa-sun';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
