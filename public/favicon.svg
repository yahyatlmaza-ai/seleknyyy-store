<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Hub circle -->
  <circle cx="32" cy="32" r="8" fill="white" opacity="0.95"/>
  <!-- 8 tentacle routes with arrowheads -->
  <!-- Top -->
  <line x1="32" y1="24" x2="32" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.88"/>
  <polygon points="32,8 29,14 35,14" fill="white" opacity="0.88"/>
  <!-- Top-right -->
  <line x1="37.7" y1="26.3" x2="47" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.82"/>
  <polygon points="50,14 43,18 47,24" fill="white" opacity="0.82"/>
  <!-- Right -->
  <line x1="40" y1="32" x2="52" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.78"/>
  <polygon points="56,32 50,29 50,35" fill="white" opacity="0.78"/>
  <!-- Bottom-right -->
  <line x1="37.7" y1="37.7" x2="47" y2="47" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.72"/>
  <polygon points="50,50 44,44 50,42" fill="white" opacity="0.72"/>
  <!-- Bottom -->
  <line x1="32" y1="40" x2="32" y2="52" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.78"/>
  <polygon points="32,56 29,50 35,50" fill="white" opacity="0.78"/>
  <!-- Bottom-left -->
  <line x1="26.3" y1="37.7" x2="17" y2="47" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.72"/>
  <polygon points="14,50 14,43 20,47" fill="white" opacity="0.72"/>
  <!-- Left -->
  <line x1="24" y1="32" x2="12" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.78"/>
  <polygon points="8,32 14,29 14,35" fill="white" opacity="0.78"/>
  <!-- Top-left -->
  <line x1="26.3" y1="26.3" x2="17" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.82"/>
  <polygon points="14,14 20,18 18,24" fill="white" opacity="0.82"/>
  <!-- Inner accent dot -->
  <circle cx="32" cy="32" r="3.5" fill="url(#dot)"/>
</svg>
